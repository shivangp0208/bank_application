version: "2"
sql:
  - engine: "mysql" 
    queries: "./db/query/"
    schema: "./db/schema/"
    gen:
      go:
        package: "db"
        out: "./db/sqlc"
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true