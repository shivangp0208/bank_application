syntax = "proto3";

package pb;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/shivangp0208/bank_application/pb";

message User {
    string username = 1;
    string full_name = 2;
    string email = 3;
    string role = 4;
    bool is_verified = 5;
    google.protobuf.Timestamp password_changed_at = 6;
    google.protobuf.Timestamp created_at = 7;
}