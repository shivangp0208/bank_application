syntax = "proto3";

package pb;

import "rpc_entries.proto";
import "rpc_accounts.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/shivangp0208/bank_application/pb";

message Transfer {
    uint64 id = 1;
    uint64 from_account_id = 2;
    uint64 to_account_id = 3;
    uint64 amount = 4;
    google.protobuf.Timestamp created_at = 5;    
}

// transfer money req and res
message TransferMoneyRequest {
    uint64 from_account_id = 1;
    uint64 to_account_id = 2;
    uint64 amount = 3;
    string currency = 4;
}
message TransferMoneyResponse {
    Transfer transfer = 1;
    Account from_account = 2;
    Entry from_entry = 3;
    Account to_account = 4;
    Entry to_entry = 5;
}