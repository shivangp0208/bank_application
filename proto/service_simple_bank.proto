syntax = "proto3";

package pb;

import "rpc_users.proto";
import "rpc_entries.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/shivangp0208/bank_application/pb";

service SimpleBank {
    rpc CreateUser (CreateUserRequest) returns (CreateUserResponse) {
        option (google.api.http) = {
            post: "/api/v1/users"
            body: "*"
        };
    }
    rpc LoginUser (LoginUserRequest) returns (LoginUserResponse) {
        option (google.api.http) = {
            post: "/api/v1/users/login"
            body: "*"
        };
    }
    rpc UpdateUser (UpdateUserRequest) returns (UpdateUserResponse) {
        option (google.api.http) = {
            patch: "/api/v1/users/{username}"
            body: "*"
        };
    }
    rpc VerifyUserEmail (VerifyEmailRequest) returns (VerifyEmailResponse) {
        option (google.api.http) = {
            get: "/api/v1/verify"
        };
    }
    rpc GetUserByUsername (GetUserRequest) returns (GetUserResponse) {
        option (google.api.http) = {
            get: "/api/v1/users/{username}"
        };
    }
    rpc GetAllUser (GetAllUserRequest) returns (GetAllUserResponse) {
        option (google.api.http) = {
            get: "/api/v1/users"
        };
    }
    rpc UpdateUserPassword (UpdatePasswordRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            patch: "/api/v1/users/me/password"
            body: "*"
        };
    }
    rpc GetAllEntryForAccountID (AccountID) returns (EntryListResponse) {
        option (google.api.http) = {
            patch: "/api/v1/accounts/{account_id}/entries"
            body: "*"
        };
    }
}